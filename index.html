<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="shortcut icon" href="./img/spaceship0.png" type="image/png" />
		<link rel="stylesheet" href="./src/index.css" />
		<script type="module" src="./src/index.js"></script>
		<title>Space Evaders</title>
	</head>

	<body>
		<div class="game-wrapper">
			<canvas id="canvas" width="1280" height="720">
				<h2>Seu navegador não suporta gráficos</h2>
			</canvas>
			<aside class="sidebar">
				<div>
					<h3>OBJETIVO DA MISSÃO</h3>
					<ul>
						<li>Desvie dos asteroides para ganhar pontos</li>
						<li>Colete as estrelas para recuperar vida</li>
						<li>Complete 3 níveis</li>
					</ul>
				</div>
				<div>
					<h3>CONTROLES</h3>
					<div class="control-group">
						<div class="row">
							<p>ACEITAR/PAUSAR</p>
							<span class="key wide">Enter</span>
						</div>
						<div class="row">
							<p>PLAYER 1</p>
							<span class="key">W</span><span class="sep">/</span><span class="key">S</span>
						</div>
						<div class="row">
							<p>PLAYER 2</p>
							<span class="key">↑</span><span class="sep">/</span><span class="key">↓</span>
						</div>
					</div>
				</div>
				<small>Feito por <a href="https://github.com/hvjustus/space-invader">hvjustus</a></small>
			</aside>
		</div>
	</body>
</html>
